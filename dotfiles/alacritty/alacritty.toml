[font]
size = 18.0

[font.normal]
family = "monospace"

[colors.primary]
background = "#0d1208"
foreground = "#8dc63f"

[colors.cursor]
text = "#0d1208"
cursor = "#c8a44a"

[colors.normal]
black   = "#111111"
red     = "#8b2020"
green   = "#2d5a1b"
yellow  = "#c8a44a"
blue    = "#3a6b2a"
magenta = "#5a7a2a"
cyan    = "#4a8a3a"
white   = "#8dc63f"

[colors.bright]
black   = "#2a2a2a"
red     = "#c04040"
green   = "#5a9e2f"
yellow  = "#c8d84a"
blue    = "#6aab4a"
magenta = "#8aaa4a"
cyan    = "#7aba6a"
white   = "#c8d84a"

[window]
opacity = 0.75
padding = { x = 8, y = 8 }
startup_mode = "Maximized"
